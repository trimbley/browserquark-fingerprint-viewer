<h1>浏览器指纹查看器</h1>
<p>一键查看当前浏览器暴露的指纹信息：User-Agent、屏幕、时区、WebGL 渲染器、Canvas 指纹等。所有检测均在本地完成，不上传任何数据。</p>
<div class="card">
<div id="out">检测中…</div>
<script>
var o=document.getElementById('out');
function row(k,v){return '<tr><td>'+k+'</td><td>'+v+'</td></tr>'}
var g='';try{var gl=document.createElement('canvas').getContext('webgl');var dx=gl.getExtension('WEBGL_debug_renderer_info');g=dx?gl.getParameter(dx.UNMASKED_RENDERER_WEBGL):''}catch(e){}
var cv='';try{var cn=document.createElement('canvas'),cx=cn.getContext('2d');cx.textBaseline='top';cx.font='14px Arial';cx.fillText('fp@2026',2,2);cv=cn.toDataURL().slice(-20)}catch(e){}
o.innerHTML='<table>'+[
['User Agent',navigator.userAgent],
['操作系统平台',navigator.platform],
['浏览器语言',(navigator.languages||[navigator.language]).join(', ')],
['屏幕分辨率',screen.width+'×'+screen.height+' @'+(window.devicePixelRatio||1)+'x'],
['时区',Intl.DateTimeFormat().resolvedOptions().timeZone],
['CPU 逻辑核心',navigator.hardwareConcurrency||'未知'],
['设备内存(GB)',navigator.deviceMemory||'未知'],
['WebGL 渲染器',g||'未知'],
['Canvas 指纹',cv||'未知'],
['Cookie 启用',navigator.cookieEnabled?'是':'否'],
['Do Not Track',navigator.doNotTrack||'未设置']
].map(function(r){return row(r[0],r[1])}).join('')+'</table>';
</script>
